[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "context-optimizer"
version = "0.1.0"
description = "Standalone autocompaction for LLM conversations — strips stale reasoning, deduplicates tool results, and summarizes old turns via local Ollama or any OpenAI-compatible provider."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "tiktoken>=0.7",
    "tokenizers>=0.15",
    "httpx>=0.25",
    "openai>=1.0",
    "loguru>=0.7",
]

[project.optional-dependencies]
# Heavy ML deps for Layer -1 repo indexing — opt-in to keep base install lightweight.
# Install with: pip install context-optimizer[repo-index]
repo-index = [
    "networkx>=3.0",
    "numpy>=1.24",
    "sentence-transformers>=2.2",
    "gitpython>=3.1",
    "tree-sitter>=0.22",
    "tree-sitter-language-pack>=0.0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/context_optimizer"]

[tool.ruff]
line-length = 88

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
]
