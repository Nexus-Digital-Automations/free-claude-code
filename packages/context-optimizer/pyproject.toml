[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "context-optimizer"
version = "0.1.0"
description = "Standalone autocompaction for LLM conversations — strips stale reasoning, deduplicates tool results, and summarizes old turns via local Ollama or any OpenAI-compatible provider."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "tiktoken>=0.7",
    "httpx>=0.25",
    "openai>=1.0",
    "loguru>=0.7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/context_optimizer"]

[tool.ruff]
line-length = 88

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
]
