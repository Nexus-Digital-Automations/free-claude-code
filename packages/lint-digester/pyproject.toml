[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lint-digester"
version = "0.1.0"
description = "MCP server: run a linter, return findings grouped by rule with one Ollama-digested example per rule."
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0",
    "loguru>=0.7",
    "context-optimizer",
]

[project.scripts]
lint-digester = "lint_digester.server:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/lint_digester"]

[tool.uv.sources]
context-optimizer = { path = "../context-optimizer", editable = true }

[tool.ruff]
line-length = 88
