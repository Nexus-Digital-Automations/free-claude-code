[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "build-digester"
version = "0.1.0"
description = "MCP server: run a build/typecheck, return errors-only with Ollama-digested error bodies."
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0",
    "loguru>=0.7",
    "context-optimizer",
]

[project.scripts]
build-digester = "build_digester.server:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/build_digester"]

[tool.uv.sources]
context-optimizer = { path = "../context-optimizer", editable = true }

[tool.ruff]
line-length = 88
